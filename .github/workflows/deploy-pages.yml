# Build static site and publish to GitHub Pages (project site:
# https://<user>.github.io/<repo>/).
#
# In repo Settings → Pages: set Source to "GitHub Actions" (not "Deploy from a branch").
# If you still see only README, branch deployment is still active or an old deployment is cached.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Registers the Pages site with Actions (required for upload/deploy to work reliably).
      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cs-course-browser/package-lock.json

      - name: Install and build
        working-directory: cs-course-browser
        env:
          # Must match the repository segment of the GitHub Pages URL.
          BASE_PATH: /${{ github.event.repository.name }}
        run: |
          npm ci
          npm run build

      - name: Verify static export
        run: |
          test -f cs-course-browser/out/index.html
          ls -la cs-course-browser/out | head -20

      - uses: actions/upload-pages-artifact@v3
        with:
          path: cs-course-browser/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
